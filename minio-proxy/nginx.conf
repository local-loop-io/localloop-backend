worker_processes auto;

events {
  worker_connections 1024;
}

http {
  map $http_x_minio_source_replication_request $minio_has_replication_marker {
    default 1;
    "" 0;
  }

  map "$http_x_minio_replication_server_side_encryption_sealed_key|$http_x_minio_replication_server_side_encryption_seal_algorithm|$http_x_minio_replication_server_side_encryption_iv|$http_x_minio_replication_encrypted_multipart|$http_x_minio_replication_actual_object_size|$http_x_minio_replication_ssec_crc" $minio_has_protected_replication_headers {
    default 1;
    "|||||" 0;
  }

  map "$minio_has_replication_marker:$minio_has_protected_replication_headers" $minio_reject_replication_header_injection {
    default 0;
    "0:1" 1;
  }

  upstream minio_upstream {
    server minio:9000;
    keepalive 32;
  }

  server {
    listen 9000;
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_connect_timeout 30s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    if ($minio_reject_replication_header_injection) {
      return 403;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header Connection "";
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://minio_upstream;
    }
  }
}
