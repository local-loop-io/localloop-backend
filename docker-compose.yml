version: '3.9'

services:
  api:
    build: .
    env_file:
      - .env.docker
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-proxy:
        condition: service_healthy
    ports:
      - "127.0.0.1:8088:8088"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.localloop-api.rule=Host(`loop-api.urbnia.com`)"
      - "traefik.http.routers.localloop-api.entrypoints=websecure"
      - "traefik.http.routers.localloop-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.localloop-api.loadbalancer.server.port=8088"
    restart: unless-stopped
    networks:
      - default
      - proxy

  postgres:
    image: postgis/postgis:18-3.6
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-localloop}
      POSTGRES_USER: ${POSTGRES_USER:-localloop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-localloop} -d ${POSTGRES_DB:-localloop}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 64M
    image: redis@sha256:3aaec283e6e593bde528077d60280ac1589887067a39273348860837c9346d7e
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-localloop}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:9201:9001"
    volumes:
      - ./data/minio:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-proxy:
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    image: nginx:1.27-alpine
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:9200:9000"
    volumes:
      - ./minio-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/minio/health/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy:
    external: true
